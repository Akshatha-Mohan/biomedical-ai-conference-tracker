name: Update dashboard

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch: {}    # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      - "data/conferences.yml"
      - "scripts/**"
      - "site/index.html"

permissions:
  pages: write      # to publish to GitHub Pages
  id-token: write   # required by the Pages deploy action

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recompute countdowns, status, and link health
        run: python scripts/update.py

      - name: Discover new biomedical venues (best-effort)
        continue-on-error: true
        run: python scripts/discover.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
