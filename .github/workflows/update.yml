name: Update dashboard

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch: {}    # lets you run it on demand from the Actions tab
  push:
    branches: [main]
    paths:
      - "data/conferences.yml"
      - "scripts/**"
      - "site/index.html"

permissions:
  contents: write   # to commit the regenerated data.json
  pages: write      # to publish to GitHub Pages
  id-token: write   # required by the Pages deploy action

# Avoid overlapping runs racing to deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recompute countdowns, status, and link health
        run: python scripts/update.py

      - name: Discover new biomedical venues (best-effort)
        continue-on-error: true
        run: python scripts/discover.py

      - name: Write run summary
        run: |
          BROKEN=$(python -c "import json;print(', '.join(json.load(open('site/data.json'))['broken_links']) or 'none')")
          COUNT=$(python -c "import json;print(json.load(open('site/data.json'))['count'])")
          echo "### Dashboard updated" >> "$GITHUB_STEP_SUMMARY"
          echo "- Conferences: $COUNT" >> "$GITHUB_STEP_SUMMARY"
          echo "- Broken links: $BROKEN" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit regenerated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data.json site/discovered.json
          git diff --staged --quiet || git commit -m "chore: daily dashboard refresh"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
